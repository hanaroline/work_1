<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>종목 통합 리포트</title>
  <style>
    /* ===== 팔레트 (dataviz 레퍼런스 팔레트, 라이트/다크) ===== */
    :root {
      --surface-1: #fcfcfb; --page: #f9f9f7;
      --text-primary: #0b0b0b; --text-secondary: #52514e; --text-muted: #898781;
      --grid: #e1e0d9; --axis: #c3c2b7; --border: rgba(11,11,11,0.10);
      --series-1: #2a78d6; --series-2: #1baf7a; --series-3: #eda100;
      --series-4: #008300; --series-5: #4a3aa7; --series-6: #e34948; --series-8: #eb6834;
      --up: #d03b3b; --down: #2a78d6; --good: #006300;
      --shadow: 0 1px 2px rgba(11,11,11,.05), 0 4px 16px rgba(11,11,11,.04);
      --radius: 14px;
    }
    :root[data-theme="dark"] {
      --surface-1: #1a1a19; --page: #0d0d0d;
      --text-primary: #ffffff; --text-secondary: #c3c2b7; --text-muted: #898781;
      --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
      --series-1: #3987e5; --series-2: #199e70; --series-3: #c98500;
      --series-4: #008300; --series-5: #9085e9; --series-6: #e66767; --series-8: #d95926;
      --up: #ff6b6b; --down: #5598e7; --good: #0ca30c;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --surface-1: #1a1a19; --page: #0d0d0d;
        --text-primary: #ffffff; --text-secondary: #c3c2b7; --text-muted: #898781;
        --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
        --series-1: #3987e5; --series-2: #199e70; --series-3: #c98500;
        --series-5: #9085e9; --series-6: #e66767; --series-8: #d95926;
        --up: #ff6b6b; --down: #5598e7; --good: #0ca30c;
        --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      background: var(--page); color: var(--text-primary); line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 상단 검색 바 ===== */
    .topbar {
      position: sticky; top: 0; z-index: 20; background: var(--surface-1);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 12px 20px; flex-wrap: wrap;
    }
    .brand { font-weight: 700; font-size: 17px; letter-spacing: -.02em; white-space: nowrap; }
    .brand .dot { color: var(--series-1); }
    .search { display: flex; flex: 1 1 300px; min-width: 200px; gap: 8px; }
    .search input {
      flex: 1; padding: 10px 14px; font-size: 15px; border: 1px solid var(--border);
      border-radius: 10px; background: var(--page); color: var(--text-primary);
    }
    .search input:focus { outline: 2px solid var(--series-1); outline-offset: 0; border-color: transparent; }
    .btn {
      border: 1px solid var(--border); background: var(--page); color: var(--text-primary);
      padding: 10px 14px; font-size: 14px; border-radius: 10px; cursor: pointer; white-space: nowrap;
    }
    .btn:hover { border-color: var(--series-1); }
    .btn-primary { background: var(--series-1); color: #fff; border-color: transparent; font-weight: 600; }
    .btn-icon { padding: 10px 12px; }
    .btn.on { background: var(--series-1); color: #fff; border-color: transparent; }

    /* 즐겨찾기 칩 */
    .favbar { max-width: 1120px; margin: 12px auto 0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .favbar .lbl { font-size: 12px; color: var(--text-muted); }
    .chip {
      display: inline-flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;
      padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface-1); color: var(--text-secondary);
    }
    .chip:hover { border-color: var(--series-1); color: var(--text-primary); }
    .chip .x { color: var(--text-muted); font-weight: 700; }
    .chip .x:hover { color: var(--up); }

    /* ===== 리포트 컨테이너 ===== */
    .report { max-width: 1120px; margin: 16px auto 60px; padding: 0 20px; }
    .card {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px 22px; margin-bottom: 18px;
    }
    .section-title {
      display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700;
      letter-spacing: -.01em; margin: 0 0 16px; color: var(--text-primary); flex-wrap: wrap;
    }
    .section-title .accent { width: 4px; height: 16px; border-radius: 2px; background: var(--series-1); }
    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px;
      border: 1px solid var(--border); color: var(--text-secondary); background: var(--page);
    }
    .badge.live { color: var(--good); border-color: color-mix(in srgb, var(--good) 40%, transparent); }
    .badge.sample { color: var(--series-3); border-color: color-mix(in srgb, var(--series-3) 45%, transparent); }

    /* ===== 종목 요약 헤더 ===== */
    .summary { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 18px 34px; }
    .summary .name-block { display: flex; flex-direction: column; gap: 4px; }
    .summary .name { font-size: 26px; font-weight: 800; letter-spacing: -.02em; display: flex; align-items: center; gap: 8px; }
    .star { cursor: pointer; font-size: 20px; color: var(--text-muted); line-height: 1; }
    .star.on { color: var(--series-3); }
    .summary .code { font-size: 13px; color: var(--text-muted); }
    .mkt-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
      background: color-mix(in srgb, var(--series-1) 15%, transparent); color: var(--series-1); }
    .price-block { display: flex; flex-direction: column; }
    .price { font-size: 30px; font-weight: 800; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .change { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--text-secondary); }
    .kpis { display: flex; flex-wrap: wrap; gap: 16px 26px; margin-left: auto; }
    .kpi { display: flex; flex-direction: column; }
    .kpi .k { font-size: 12px; color: var(--text-muted); }
    .kpi .v { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .asof { width: 100%; font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ===== 토글/차트 ===== */
    .toggles { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
    .toggles button {
      font-size: 12px; padding: 5px 10px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border); background: var(--page); color: var(--text-secondary);
    }
    .toggles button.active { background: var(--series-1); color: #fff; border-color: transparent; font-weight: 600; }
    .chart-wrap { position: relative; height: 300px; }
    .chart-wrap.small { height: 110px; }
    .chart-wrap.mid { height: 200px; }
    .chart-cap { font-size: 11px; color: var(--text-muted); margin: 2px 0 -6px 2px; }
    .stat-row { display: flex; flex-wrap: wrap; gap: 14px 30px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--grid); }
    .stat { display: flex; flex-direction: column; }
    .stat .k { font-size: 12px; color: var(--text-muted); }
    .stat .v { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 820px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ===== 투자의견 ===== */
    .target-track { position: relative; height: 10px; border-radius: 999px; margin: 34px 0 30px;
      background: linear-gradient(90deg, var(--down), var(--text-muted), var(--up)); opacity: .9; }
    .target-marker { position: absolute; top: 50%; transform: translate(-50%, -50%); }
    .target-marker .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--surface-1); }
    .target-marker .lbl { position: absolute; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 11px; font-weight: 600; }
    .target-marker .lbl.top { bottom: 16px; } .target-marker .lbl.bot { top: 16px; }
    .opinion-bar { display: flex; height: 26px; border-radius: 8px; overflow: hidden; margin: 4px 0 10px; }
    .opinion-bar > div { display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; }
    .opinion-legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-secondary); }
    .opinion-legend span { display: inline-flex; align-items: center; gap: 5px; }
    .opinion-legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

    /* ===== 리스트 ===== */
    .list { display: flex; flex-direction: column; }
    .list-item { display: flex; gap: 12px; padding: 11px 0; border-top: 1px solid var(--grid); }
    .list-item:first-child { border-top: 0; }
    .list-item .main { flex: 1; min-width: 0; }
    .list-item .t { font-size: 14px; font-weight: 600; color: var(--text-primary); text-decoration: none; }
    .list-item .t:hover { color: var(--series-1); text-decoration: underline; }
    .list-item .meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .op-pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; white-space: nowrap;
      background: color-mix(in srgb, var(--series-4) 15%, transparent); color: var(--series-4); }
    .op-pill.hold { background: color-mix(in srgb, var(--series-3) 18%, transparent); color: var(--series-3); }
    .op-pill.sell { background: color-mix(in srgb, var(--series-6) 15%, transparent); color: var(--series-6); }
    .rt { text-align: right; white-space: nowrap; }
    .rt .tgt { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .rt .tgt-k { font-size: 11px; color: var(--text-muted); }

    /* ===== 테이블 ===== */
    table.fin { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
    table.fin th, table.fin td { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--grid); white-space: nowrap; }
    table.fin th:first-child, table.fin td:first-child { text-align: left; color: var(--text-secondary); }
    table.fin thead th { color: var(--text-muted); font-weight: 600; font-size: 12px; }
    table.fin tbody tr:last-child td { border-bottom: 0; }

    /* ===== 상태 ===== */
    .state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
    .state .big { font-size: 40px; margin-bottom: 12px; }
    .spinner { width: 34px; height: 34px; border: 3px solid var(--grid); border-top-color: var(--series-1);
      border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .banner { font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px;
      background: color-mix(in srgb, var(--series-3) 12%, transparent); color: var(--text-secondary);
      border: 1px solid color-mix(in srgb, var(--series-3) 30%, transparent); }
    .foot { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 8px; }
    .foot a { color: var(--series-1); }

    /* ===== 인쇄/PDF (A4 지향) ===== */
    @media print {
      .topbar, .favbar, .toggles, .btn, .star { display: none !important; }
      body { background: #fff; }
      .report { margin: 0; max-width: none; padding: 0; }
      .card { box-shadow: none; border-color: #ddd; break-inside: avoid; margin-bottom: 10px; padding: 12px 14px; }
      .chart-wrap { height: 210px; } .chart-wrap.small { height: 90px; } .chart-wrap.mid { height: 160px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="dot">◼</span> 종목 통합 리포트</div>
    <form class="search" id="searchForm" autocomplete="off">
      <input id="q" list="tickerList" placeholder="종목명 또는 코드 (예: 삼성전자, 005930)" />
      <datalist id="tickerList"></datalist>
      <button type="submit" class="btn btn-primary">조회</button>
    </form>
    <button class="btn" id="compareBtn" title="여러 종목 비교">⇄ 비교</button>
    <button class="btn btn-icon" id="pdfBtn" title="PDF 저장 / 인쇄">🖨 PDF</button>
    <button class="btn btn-icon" id="diagBtn" title="데이터 진단(실시간 응답 확인)">🔧</button>
    <button class="btn btn-icon" id="themeBtn" title="라이트/다크 전환">◐</button>
  </header>

  <div id="diagOverlay" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);padding:24px;">
    <div style="max-width:820px;margin:0 auto;background:var(--surface-1);border:1px solid var(--border);border-radius:14px;padding:18px 20px;max-height:88vh;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <b style="font-size:15px;">🔧 데이터 진단</b>
        <span style="font-size:12px;color:var(--text-muted);">아래 내용을 복사해 개발자에게 전달하면 파싱 오류를 정확히 수정할 수 있습니다.</span>
        <button class="btn" id="diagCopy" style="margin-left:auto;">복사</button>
        <button class="btn" id="diagClose">닫기</button>
      </div>
      <textarea id="diagText" readonly style="flex:1;min-height:360px;width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;border:1px solid var(--border);border-radius:8px;background:var(--page);color:var(--text-primary);padding:12px;white-space:pre;overflow:auto;"></textarea>
    </div>
  </div>
  <div class="favbar" id="favbar"></div>

  <main class="report" id="report">
    <div class="state"><div class="big">📈</div><div>종목명 또는 종목코드를 입력해 통합 리포트를 조회하세요.</div></div>
  </main>

  <!-- Chart.js는 저장소에 로컬 번들(오프라인/CDN 차단 환경에서도 동작). 실패 시 CDN 폴백. -->
  <script src="vendor/chart.umd.js"></script>
  <script>
    if (typeof Chart === "undefined") {
      document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"><\/script>');
    }
  </script>
  <script src="data/tickers.js"></script>
  <script src="data/sample.js"></script>
  <script>
  (function () {
    "use strict";
    var nf = new Intl.NumberFormat("ko-KR");
    var els = {
      report: document.getElementById("report"),
      form: document.getElementById("searchForm"),
      q: document.getElementById("q"),
      datalist: document.getElementById("tickerList"),
      favbar: document.getElementById("favbar"),
      themeBtn: document.getElementById("themeBtn"),
      pdfBtn: document.getElementById("pdfBtn"),
      compareBtn: document.getElementById("compareBtn")
    };
    var state = {
      data: null, ticker: null, range: "1Y", charts: {},
      priceMode: "price", showMA: true,   // price | rebase
      mode: "single", compare: [], favorites: []
    };

    /* ---------- 포맷 ---------- */
    function won(v) { return v == null ? "-" : nf.format(Math.round(v)) + "원"; }
    function wonShort(v) {
      if (v == null) return "-"; var a = Math.abs(v);
      if (a >= 1e12) return (v / 1e12).toFixed(1) + "조원";
      if (a >= 1e8) return Math.round(v / 1e8).toLocaleString("ko-KR") + "억원";
      return nf.format(v) + "원";
    }
    function eok(v) { if (v == null) return "-"; if (Math.abs(v) >= 10000) return (v / 10000).toFixed(1) + "조"; return nf.format(Math.round(v)) + "억"; }
    function pct(v) { return v == null ? "-" : (v > 0 ? "+" : "") + v.toFixed(2) + "%"; }
    function signCls(v) { return v > 0 ? "up" : v < 0 ? "down" : "flat"; }
    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }

    function css(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
    function themeColors() {
      return { s1: css("--series-1"), s2: css("--series-2"), s3: css("--series-3"),
        s5: css("--series-5"), s6: css("--series-6"), s8: css("--series-8"),
        up: css("--up"), down: css("--down"),
        grid: css("--grid"), muted: css("--text-muted"), text: css("--text-secondary"), surface: css("--surface-1") };
    }

    /* ================= 데이터 레이어 ================= */
    var PROXIES = [
      function (u) { return u; },
      function (u) { return "https://corsproxy.io/?url=" + encodeURIComponent(u); },
      function (u) { return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); },
      function (u) { return "https://thingproxy.freeboard.io/fetch/" + u; }
    ];
    var PROXY_NAMES = ["직접", "corsproxy.io", "allorigins.win", "thingproxy"];
    var DIAG = []; // 데이터 진단용: 각 요청의 성공여부/경로/원문 일부 캡처
    function withTimeout(promise, ms) {
      return new Promise(function (resolve, reject) {
        var t = setTimeout(function () { reject(new Error("timeout")); }, ms);
        promise.then(function (v) { clearTimeout(t); resolve(v); }, function (e) { clearTimeout(t); reject(e); });
      });
    }
    // 캐시 무력화: 프록시/CDN이 오래된 응답을 돌려주지 않도록 매 호출 고유 파라미터 부여
    function bust(url) { return url + (url.indexOf("?") >= 0 ? "&" : "?") + "_ts=" + Date.now(); }
    // 프록시를 병렬 시도하고 가장 먼저 성공하는 응답을 사용(폴백 지연 최소화, 각 시도 4초 타임아웃)
    function fetchText(url) {
      var orig = url;
      url = bust(url);
      var attempts = PROXIES.map(function (w, i) {
        return withTimeout(
          fetch(w(url), { headers: { Accept: "application/json, text/plain, */*" }, cache: "no-store" })
            .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text().then(function (t) { return { t: t, pi: i }; }); }),
          4000
        );
      });
      var combined;
      if (typeof Promise.any === "function") combined = Promise.any(attempts);
      else combined = new Promise(function (resolve, reject) { var left = attempts.length, err; attempts.forEach(function (p) { p.then(resolve, function (e) { err = e; if (--left === 0) reject(err); }); }); });
      return combined.then(
        function (o) { DIAG.push({ url: orig, ok: true, via: PROXY_NAMES[o.pi] || ("proxy#" + o.pi), len: o.t.length, head: o.t.slice(0, 1400) }); return o.t; },
        function (e) { DIAG.push({ url: orig, ok: false, err: String((e && e.message) || e) }); throw e; }
      );
    }
    function fetchJson(url) { return fetchText(url).then(function (t) { return JSON.parse(t); }); }
    function num(v) { if (v == null) return null; var n = parseFloat(String(v).replace(/,/g, "")); return isNaN(n) ? null : n; }
    function raw(o) { return o && typeof o === "object" && "raw" in o ? o.raw : o; }
    // 한국식 금액 문자열("504조 1,234억원", "5,041,234"(억 단위), 원 숫자)을 원 단위로 변환
    function parseKMoney(v) {
      if (v == null) return null;
      var s = String(v);
      var jo = s.match(/([\d,.]+)\s*조/), eok = s.match(/([\d,.]+)\s*억/);
      if (jo || eok) { var w = 0; if (jo) w += parseFloat(jo[1].replace(/,/g, "")) * 1e12; if (eok) w += parseFloat(eok[1].replace(/,/g, "")) * 1e8; return Math.round(w); }
      var n = num(s); if (n == null) return null;
      // 네이버 marketValue는 대체로 '억원' 단위 정수(예: 5041234 → 504.1조)
      return Math.round(n * 1e8);
    }

    /* --- 네이버 모바일 API (한국 데이터 정확) --- */
    var NAVER = "https://m.stock.naver.com/api/stock/";
    function fetchNaver(ticker) {
      var c = ticker.code;
      return Promise.all([
        fetchJson(NAVER + c + "/basic").catch(function () { return null; }),
        fetchJson(NAVER + c + "/price?pageSize=250&page=1").catch(function () { return null; }),
        fetchJson(NAVER + c + "/trend").catch(function () { return null; })
      ]).then(function (arr) { return normalizeNaver(arr[0], arr[1], arr[2], ticker); });
    }

      destroyChart("cmp");
      if (!ready.length) return;
      // 공통 라벨: 첫 종목 날짜 기준
      var base = ready[0].data.chart, labels = sliceR(base.dates);
      var ds = ready.map(function (x, i) {
        var cl = sliceR(x.data.chart.close), b0 = cl[0];
        return { label: x.ticker.name, data: cl.map(function (v) { return +((v / b0) * 100).toFixed(2); }), borderColor: COLORS[i % COLORS.length], borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, tension: .2 };
      });
      var opts = baseOpts(c, function (v) { return v.toFixed(1); }, true);
      state.charts.cmp = new Chart(document.getElementById("cmpChart"), { type: "line", data: { labels: labels, datasets: ds }, options: opts });
    }

    /* ================= 조회 ================= */
    function runQuery(rawInput) {
      var ticker = window.resolveTicker(rawInput);
      if (!ticker) { els.report.innerHTML = '<div class="state"><div class="big">🔍</div><div>"' + esc(rawInput) + '" 종목을 찾지 못했습니다.<br>종목명 또는 6자리 코드를 입력하세요.</div></div>'; return; }
      if (state.mode === "compare") { addCompare(ticker.code); els.q.value = ""; return; }
      state.ticker = ticker; els.q.value = ticker.name;
      els.report.innerHTML = '<div class="state"><div class="spinner"></div><div>' + esc(ticker.name) + ' (' + ticker.code + ') 리포트를 불러오는 중…</div></div>';
      loadData(ticker).then(function (d) { d.ticker = ticker.code; state.data = d; render(ticker, d); })
        .catch(function (err) { console.error(err); var d = window.generateSampleData(ticker); d.ticker = ticker.code;
          d.sources = { market: "sample", flow: "sample", fin: "sample", rec: "sample", news: "sample", index: "sample" }; d.asOf = new Date(); state.data = d; render(ticker, d); });
    }

    /* ================= 초기화 ================= */
    function buildDatalist() { els.datalist.innerHTML = window.TICKERS.map(function (t) { return '<option value="' + t.name + '">' + t.code + " · " + t.market + "</option>"; }).join(""); }
    function initTheme() {
      var saved = null; try { saved = localStorage.getItem("theme"); } catch (e) {}
      if (saved) document.documentElement.setAttribute("data-theme", saved);
      els.themeBtn.addEventListener("click", function () {
        var cur = document.documentElement.getAttribute("data-theme");
        var next = cur === "dark" ? "light" : cur === "light" ? "dark" : (matchMedia("(prefers-color-scheme: dark)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", next); try { localStorage.setItem("theme", next); } catch (e) {}
        if (state.mode === "compare") renderCompare(); else if (state.data && state.ticker) render(state.ticker, state.data);
      });
    }
    /* ================= 데이터 진단 ================= */
    function openDiag() {
      var L = [];
      L.push("=== 종목 통합 리포트 데이터 진단 ===");
      L.push("종목: " + (state.ticker ? state.ticker.name + " (" + state.ticker.code + ", " + state.ticker.market + ")" : "-"));
      L.push("조회시각: " + fmtDateTime(new Date()));
      L.push("섹션 출처(sources): " + (state.data && state.data.sources ? JSON.stringify(state.data.sources) : "-"));
      if (state.data && state.data.quote) { var q = state.data.quote; L.push("표시값: price=" + q.price + " change=" + q.change + " pct=" + q.changePct + " mcap=" + q.marketCap + " per=" + q.per + " pbr=" + q.pbr + " eps=" + q.eps + " hi52=" + q.high52 + " lo52=" + q.low52); }
      if (state.data && state.data.chart) { var c = state.data.chart; L.push("차트: " + c.dates.length + "일, 마지막날짜=" + c.dates[c.dates.length - 1] + " 마지막종가=" + c.close[c.close.length - 1]); }
      if (state.data && state.data.recommendation) { var r = state.data.recommendation; L.push("목표주가: mean=" + r.targetMean + " high=" + r.targetHigh + " low=" + r.targetLow + " n=" + r.numberOfAnalysts); }
      L.push("");
      L.push("--- 원본 응답 캡처 (" + DIAG.length + "건, 각 앞부분 1400자) ---");
      DIAG.forEach(function (d, i) {
        L.push("[" + (i + 1) + "] " + (d.ok ? "OK via " + (d.via || "-") : "FAIL") + "  " + d.url);
        L.push(d.ok ? ("len=" + d.len + "\n" + d.head) : ("err=" + d.err));
        L.push("--------------------------------------");
      });
      document.getElementById("diagText").value = L.join("\n");
      document.getElementById("diagOverlay").style.display = "block";
    }
    document.getElementById("diagBtn").addEventListener("click", openDiag);
    document.getElementById("diagClose").addEventListener("click", function () { document.getElementById("diagOverlay").style.display = "none"; });
    document.getElementById("diagCopy").addEventListener("click", function () {
      var ta = document.getElementById("diagText"); ta.focus(); ta.select();
      var done = function () { var b = document.getElementById("diagCopy"); b.textContent = "복사됨!"; setTimeout(function () { b.textContent = "복사"; }, 1500); };
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(ta.value).then(done, function () { try { document.execCommand("copy"); done(); } catch (e) {} });
      else { try { document.execCommand("copy"); done(); } catch (e) {} }
    });

    els.form.addEventListener("submit", function (e) { e.preventDefault(); if (els.q.value.trim()) runQuery(els.q.value.trim()); });
    els.pdfBtn.addEventListener("click", function () { window.print(); });
    els.compareBtn.addEventListener("click", function () { if (state.mode === "compare") exitCompare(); else enterCompare(); });
    buildDatalist(); loadFav(); renderFavChips(); initTheme();
    runQuery("삼성전자");
  })();
  </script>
</body>
</html>
