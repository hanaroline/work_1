<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>종목 통합 리포트</title>
  <style>
    /* ===== 팔레트 (dataviz 레퍼런스 팔레트, 라이트/다크) ===== */
    :root {
      --surface-1: #fcfcfb;       /* 카드 표면 */
      --page: #f9f9f7;            /* 페이지 배경 */
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --text-muted: #898781;
      --grid: #e1e0d9;
      --axis: #c3c2b7;
      --border: rgba(11, 11, 11, 0.10);
      --series-1: #2a78d6;        /* blue */
      --series-2: #1baf7a;        /* aqua */
      --series-3: #eda100;        /* yellow */
      --series-4: #008300;        /* green */
      --series-6: #e34948;        /* red */
      --up: #d03b3b;              /* 상승(한국 관례: 빨강) */
      --down: #2a78d6;            /* 하락(파랑) */
      --good: #006300;
      --shadow: 0 1px 2px rgba(11,11,11,.05), 0 4px 16px rgba(11,11,11,.04);
      --radius: 14px;
    }
    :root[data-theme="dark"] {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --grid: #2c2c2a;
      --axis: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --series-1: #3987e5;
      --series-2: #199e70;
      --series-3: #c98500;
      --series-4: #008300;
      --series-6: #e66767;
      --up: #ff6b6b;
      --down: #5598e7;
      --good: #0ca30c;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --surface-1: #1a1a19;
        --page: #0d0d0d;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #898781;
        --grid: #2c2c2a;
        --axis: #383835;
        --border: rgba(255, 255, 255, 0.10);
        --series-1: #3987e5;
        --series-2: #199e70;
        --series-3: #c98500;
        --series-6: #e66767;
        --up: #ff6b6b;
        --down: #5598e7;
        --good: #0ca30c;
        --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
      background: var(--page);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 상단 검색 바 ===== */
    .topbar {
      position: sticky; top: 0; z-index: 20;
      background: var(--surface-1);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px;
      flex-wrap: wrap;
    }
    .brand { font-weight: 700; font-size: 17px; letter-spacing: -.02em; white-space: nowrap; }
    .brand .dot { color: var(--series-1); }
    .search { display: flex; flex: 1 1 320px; min-width: 220px; gap: 8px; }
    .search input {
      flex: 1; padding: 10px 14px; font-size: 15px;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--page); color: var(--text-primary);
    }
    .search input:focus { outline: 2px solid var(--series-1); outline-offset: 0; border-color: transparent; }
    .btn {
      border: 1px solid var(--border); background: var(--page); color: var(--text-primary);
      padding: 10px 16px; font-size: 14px; border-radius: 10px; cursor: pointer; white-space: nowrap;
    }
    .btn:hover { border-color: var(--series-1); }
    .btn-primary { background: var(--series-1); color: #fff; border-color: transparent; font-weight: 600; }
    .btn-icon { padding: 10px 12px; }

    /* ===== 리포트 컨테이너 ===== */
    .report { max-width: 1120px; margin: 22px auto 60px; padding: 0 20px; }
    .card {
      background: var(--surface-1); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 20px 22px; margin-bottom: 18px;
    }
    .section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; letter-spacing: -.01em;
      margin: 0 0 16px; color: var(--text-primary);
    }
    .section-title .accent { width: 4px; height: 16px; border-radius: 2px; background: var(--series-1); }
    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px;
      border: 1px solid var(--border); color: var(--text-secondary); background: var(--page);
    }
    .badge.live { color: var(--good); border-color: color-mix(in srgb, var(--good) 40%, transparent); }
    .badge.sample { color: var(--series-3); border-color: color-mix(in srgb, var(--series-3) 45%, transparent); }
    .ml-auto { margin-left: auto; }

    /* ===== 종목 요약 헤더 ===== */
    .summary { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 20px 34px; }
    .summary .name-block { display: flex; flex-direction: column; gap: 4px; }
    .summary .name { font-size: 26px; font-weight: 800; letter-spacing: -.02em; }
    .summary .code { font-size: 13px; color: var(--text-muted); }
    .mkt-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 6px; margin-left: 8px; vertical-align: middle;
      background: color-mix(in srgb, var(--series-1) 15%, transparent); color: var(--series-1); }
    .price-block { display: flex; flex-direction: column; }
    .price { font-size: 30px; font-weight: 800; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .change { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .up { color: var(--up); }
    .down { color: var(--down); }
    .flat { color: var(--text-secondary); }
    .kpis { display: flex; flex-wrap: wrap; gap: 18px 28px; margin-left: auto; }
    .kpi { display: flex; flex-direction: column; }
    .kpi .k { font-size: 12px; color: var(--text-muted); }
    .kpi .v { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ===== 시세 섹션 ===== */
    .range-toggle { display: flex; gap: 4px; margin-left: auto; }
    .range-toggle button {
      font-size: 12px; padding: 5px 10px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border); background: var(--page); color: var(--text-secondary);
    }
    .range-toggle button.active { background: var(--series-1); color: #fff; border-color: transparent; font-weight: 600; }
    .chart-wrap { position: relative; height: 300px; }
    .chart-wrap.small { height: 110px; }
    .stat-row { display: flex; flex-wrap: wrap; gap: 14px 30px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--grid); }
    .stat { display: flex; flex-direction: column; }
    .stat .k { font-size: 12px; color: var(--text-muted); }
    .stat .v { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ===== 그리드 레이아웃 ===== */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 820px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ===== 투자의견 ===== */
    .target-band { margin: 6px 0 18px; }
    .target-track { position: relative; height: 10px; border-radius: 999px; margin: 34px 0 30px;
      background: linear-gradient(90deg, var(--down), var(--text-muted), var(--up)); opacity: .9; }
    .target-marker { position: absolute; top: 50%; transform: translate(-50%, -50%); }
    .target-marker .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--surface-1); }
    .target-marker .lbl { position: absolute; left: 50%; transform: translateX(-50%); white-space: nowrap;
      font-size: 11px; font-weight: 600; }
    .target-marker .lbl.top { bottom: 16px; }
    .target-marker .lbl.bot { top: 16px; }
    .opinion-bar { display: flex; height: 26px; border-radius: 8px; overflow: hidden; margin: 4px 0 10px; }
    .opinion-bar > div { display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; }
    .opinion-legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-secondary); }
    .opinion-legend span { display: inline-flex; align-items: center; gap: 5px; }
    .opinion-legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

    /* ===== 리포트/뉴스 리스트 ===== */
    .list { display: flex; flex-direction: column; }
    .list-item { display: flex; gap: 12px; padding: 11px 0; border-top: 1px solid var(--grid); }
    .list-item:first-child { border-top: 0; }
    .list-item .main { flex: 1; min-width: 0; }
    .list-item .t { font-size: 14px; font-weight: 600; color: var(--text-primary); text-decoration: none; }
    .list-item .t:hover { color: var(--series-1); text-decoration: underline; }
    .list-item .meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .op-pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; white-space: nowrap;
      background: color-mix(in srgb, var(--series-4) 15%, transparent); color: var(--series-4); }
    .op-pill.hold { background: color-mix(in srgb, var(--series-3) 18%, transparent); color: var(--series-3); }
    .op-pill.sell { background: color-mix(in srgb, var(--series-6) 15%, transparent); color: var(--series-6); }
    .rt { text-align: right; white-space: nowrap; }
    .rt .tgt { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .rt .tgt-k { font-size: 11px; color: var(--text-muted); }

    /* ===== 재무 테이블 ===== */
    table.fin { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
    table.fin th, table.fin td { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--grid); }
    table.fin th:first-child, table.fin td:first-child { text-align: left; color: var(--text-secondary); }
    table.fin thead th { color: var(--text-muted); font-weight: 600; font-size: 12px; }
    table.fin tbody tr:last-child td { border-bottom: 0; }
    .pos { color: var(--up); } .neg { color: var(--down); }

    /* ===== 상태(로딩/에러/빈) ===== */
    .state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
    .state .big { font-size: 40px; margin-bottom: 12px; }
    .spinner { width: 34px; height: 34px; border: 3px solid var(--grid); border-top-color: var(--series-1);
      border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .banner { font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px;
      background: color-mix(in srgb, var(--series-3) 12%, transparent); color: var(--text-secondary);
      border: 1px solid color-mix(in srgb, var(--series-3) 30%, transparent); }
    .foot { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 8px; }
    .foot a { color: var(--series-1); }

    /* ===== 인쇄 (A4 한 장 지향) ===== */
    @media print {
      .topbar, .range-toggle, .btn { display: none !important; }
      body { background: #fff; }
      .report { margin: 0; max-width: none; padding: 0; }
      .card { box-shadow: none; border-color: #ddd; break-inside: avoid; margin-bottom: 10px; padding: 12px 14px; }
      .chart-wrap { height: 200px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="dot">◼</span> 종목 통합 리포트</div>
    <form class="search" id="searchForm" autocomplete="off">
      <input id="q" list="tickerList" placeholder="종목명 또는 코드 입력 (예: 삼성전자, 005930)" />
      <datalist id="tickerList"></datalist>
      <button type="submit" class="btn btn-primary">조회</button>
    </form>
    <button class="btn btn-icon" id="themeBtn" title="라이트/다크 전환">◐</button>
    <button class="btn btn-icon" id="printBtn" title="인쇄 / PDF 저장">🖨</button>
  </header>

  <main class="report" id="report">
    <div class="state">
      <div class="big">📈</div>
      <div>종목명 또는 종목코드를 입력해 통합 리포트를 조회하세요.</div>
    </div>
  </main>

  <!-- Chart.js는 저장소에 로컬 번들(오프라인/CDN 차단 환경에서도 동작). 실패 시 CDN 폴백. -->
  <script src="vendor/chart.umd.js"></script>
  <script>
    if (typeof Chart === "undefined") {
      document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"><\/script>');
    }
  </script>
  <script src="data/tickers.js"></script>
  <script src="data/sample.js"></script>
  <script>
  (function () {
    "use strict";

    var nf = new Intl.NumberFormat("ko-KR");
    var els = {
      report: document.getElementById("report"),
      form: document.getElementById("searchForm"),
      q: document.getElementById("q"),
      datalist: document.getElementById("tickerList"),
      themeBtn: document.getElementById("themeBtn"),
      printBtn: document.getElementById("printBtn")
    };
    var state = { data: null, ticker: null, range: "1Y", charts: {} };

    /* ---------- 포맷 helpers ---------- */
    function won(v) { return nf.format(Math.round(v)) + "원"; }
    function wonShort(v) {
      if (v == null) return "-";
      var a = Math.abs(v);
      if (a >= 1e12) return (v / 1e12).toFixed(1) + "조원";
      if (a >= 1e8) return Math.round(v / 1e8).toLocaleString("ko-KR") + "억원";
      return nf.format(v) + "원";
    }
    function eok(v) { // 억원 단위 입력
      if (v == null) return "-";
      if (Math.abs(v) >= 10000) return (v / 10000).toFixed(1) + "조";
      return nf.format(Math.round(v)) + "억";
    }
    function pct(v) { return (v > 0 ? "+" : "") + v.toFixed(2) + "%"; }
    function signCls(v) { return v > 0 ? "up" : v < 0 ? "down" : "flat"; }

    /* ---------- 테마 색상 (차트용) ---------- */
    function css(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    function themeColors() {
      return {
        s1: css("--series-1"), s2: css("--series-2"), s3: css("--series-3"),
        grid: css("--grid"), axis: css("--axis"), muted: css("--text-muted"),
        text: css("--text-secondary"), surface: css("--surface-1")
      };
    }

    /* ================= 데이터 레이어 ================= */
    var PROXIES = [
      function (u) { return u; }, // 직접
      function (u) { return "https://corsproxy.io/?url=" + encodeURIComponent(u); },
      function (u) { return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); }
    ];

    function fetchText(url) {
      var i = 0;
      function attempt() {
        if (i >= PROXIES.length) return Promise.reject(new Error("all proxies failed"));
        var wrapped = PROXIES[i++](url);
        return fetch(wrapped, { headers: { Accept: "application/json, text/plain, */*" } })
          .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
          .catch(function () { return attempt(); });
      }
      return attempt();
    }
    function fetchJson(url) { return fetchText(url).then(function (t) { return JSON.parse(t); }); }

    function raw(o) { return o && typeof o === "object" && "raw" in o ? o.raw : o; }

    function fetchYahoo(ticker) {
      var symbol = window.toYahooSymbol(ticker);
      var chartUrl = "https://query1.finance.yahoo.com/v8/finance/chart/" + symbol + "?range=1y&interval=1d";
      var qsUrl = "https://query1.finance.yahoo.com/v10/finance/quoteSummary/" + symbol +
        "?modules=price,summaryDetail,defaultKeyStatistics,financialData,recommendationTrend,incomeStatementHistory,balanceSheetHistory";
      return Promise.all([
        fetchJson(chartUrl),
        fetchJson(qsUrl).catch(function () { return null; })
      ]).then(function (arr) { return normalizeYahoo(arr[0], arr[1]); });
    }

    function normalizeYahoo(chartJson, qsJson) {
      var r = chartJson && chartJson.chart && chartJson.chart.result && chartJson.chart.result[0];
      if (!r || !r.meta) throw new Error("no chart");
      var meta = r.meta;
      var ts = r.timestamp || [];
      var q = (r.indicators && r.indicators.quote && r.indicators.quote[0]) || {};
      var dates = [], close = [], volume = [];
      for (var i = 0; i < ts.length; i++) {
        if (q.close && q.close[i] == null) continue;
        dates.push(new Date(ts[i] * 1000).toISOString().slice(0, 10));
        close.push(Math.round(q.close[i]));
        volume.push(q.volume ? q.volume[i] : null);
      }
      var price = meta.regularMarketPrice;
      var prevClose = meta.chartPreviousClose || meta.previousClose || close[close.length - 2] || price;

      var data = {
        quote: {
          price: price, prevClose: prevClose,
          change: price - prevClose,
          changePct: +(((price - prevClose) / prevClose) * 100).toFixed(2),
          marketCap: null, per: null, pbr: null, eps: null,
          high52: meta.fiftyTwoWeekHigh || Math.max.apply(null, close),
          low52: meta.fiftyTwoWeekLow || Math.min.apply(null, close),
          currency: meta.currency || "KRW"
        },
        chart: { dates: dates, close: close, volume: volume },
        recommendation: null, reports: null, news: null,
        financials: null, currency: meta.currency || "KRW"
      };

      var m = qsJson && qsJson.quoteSummary && qsJson.quoteSummary.result && qsJson.quoteSummary.result[0];
      if (m) {
        if (m.price) data.quote.marketCap = raw(m.price.marketCap);
        if (m.summaryDetail) {
          data.quote.per = raw(m.summaryDetail.trailingPE);
        }
        if (m.defaultKeyStatistics) {
          data.quote.pbr = raw(m.defaultKeyStatistics.priceToBook);
          data.quote.eps = raw(m.defaultKeyStatistics.trailingEps);
        }
        if (m.financialData) {
          var fd = m.financialData;
          data.recommendation = {
            targetMean: raw(fd.targetMeanPrice), targetHigh: raw(fd.targetHighPrice),
            targetLow: raw(fd.targetLowPrice), currentPrice: raw(fd.currentPrice) || price,
            numberOfAnalysts: raw(fd.numberOfAnalystOpinions) || 0,
            dist: null, ratingText: fd.recommendationKey || ""
          };
        }
        if (m.recommendationTrend && m.recommendationTrend.trend && m.recommendationTrend.trend[0]) {
          var tr = m.recommendationTrend.trend[0];
          var dist = { strongBuy: tr.strongBuy || 0, buy: tr.buy || 0, hold: tr.hold || 0, sell: tr.sell || 0, strongSell: tr.strongSell || 0 };
          if (data.recommendation) data.recommendation.dist = dist;
        }
        // 재무제표 (raw KRW -> 억원)
        var inc = m.incomeStatementHistory && m.incomeStatementHistory.incomeStatementHistory;
        var bal = m.balanceSheetHistory && m.balanceSheetHistory.balanceSheetStatements;
        if (inc && inc.length) {
          var fin = { years: [], revenue: [], operatingIncome: [], netIncome: [], assets: [], liabilities: [], equity: [], roe: [], debtRatio: [] };
          var rows = inc.slice(0, 4).reverse();
          for (var j = 0; j < rows.length; j++) {
            var it = rows[j];
            var yr = it.endDate && it.endDate.fmt ? it.endDate.fmt.slice(0, 4) : "";
            fin.years.push(yr);
            fin.revenue.push(toEok(raw(it.totalRevenue)));
            fin.operatingIncome.push(toEok(raw(it.operatingIncome)));
            fin.netIncome.push(toEok(raw(it.netIncome)));
            var bs = bal && bal.find ? bal.find(function (b) { return b.endDate && b.endDate.fmt === (it.endDate && it.endDate.fmt); }) : null;
            var eq = bs ? toEok(raw(bs.totalStockholderEquity)) : null;
            var li = bs ? toEok(raw(bs.totalLiab)) : null;
            fin.equity.push(eq);
            fin.liabilities.push(li);
            fin.assets.push(eq != null && li != null ? eq + li : null);
            fin.roe.push(eq ? +((toEok(raw(it.netIncome)) / eq) * 100).toFixed(1) : null);
            fin.debtRatio.push(eq && li != null ? +((li / eq) * 100).toFixed(1) : null);
          }
          if (fin.years.length) data.financials = fin;
        }
      }
      return data;
    }
    function toEok(v) { return v == null ? null : Math.round(v / 1e8); }

    /* Google News RSS (프록시 경유) */
    function fetchNews(name) {
      var url = "https://news.google.com/rss/search?q=" + encodeURIComponent(name + " 주가") + "&hl=ko&gl=KR&ceid=KR:ko";
      return fetchText(url).then(function (xml) {
        var doc = new DOMParser().parseFromString(xml, "text/xml");
        var items = Array.prototype.slice.call(doc.querySelectorAll("item")).slice(0, 6);
        if (!items.length) throw new Error("no news");
        return items.map(function (it) {
          var title = (it.querySelector("title") || {}).textContent || "";
          var link = (it.querySelector("link") || {}).textContent || "#";
          var pub = (it.querySelector("pubDate") || {}).textContent || "";
          var src = (it.querySelector("source") || {}).textContent || "";
          var d = pub ? new Date(pub).toISOString().slice(0, 10) : "";
          return { title: title, source: src || "Google News", date: d, url: link, summary: "" };
        });
      });
    }

    /* 실 API 우선, 실패/누락 시 샘플로 섹션별 폴백 */
    function loadData(ticker) {
      var sample = window.generateSampleData(ticker);
      var sources = { market: "sample", fin: "sample", rec: "sample", news: "sample" };
      var live = null;
      return fetchYahoo(ticker)
        .then(function (d) { live = d; })
        .catch(function () { live = null; })
        .then(function () {
          var data;
          if (live && live.quote && live.chart && live.chart.close.length) {
            data = live; sources.market = "live";
            // per/pbr/marketCap 누락 시 샘플 프로파일로 보완
            if (data.quote.marketCap == null) data.quote.marketCap = sample.quote.marketCap;
            if (data.quote.per == null) data.quote.per = sample.quote.per;
            if (data.quote.pbr == null) data.quote.pbr = sample.quote.pbr;
            if (data.quote.eps == null) data.quote.eps = sample.quote.eps;
            // 재무: 실시간 있으면 live, 없으면 샘플
            if (data.financials && data.financials.years.length) { sources.fin = "live"; }
            else { data.financials = sample.financials; sources.fin = "sample"; }
            // 투자의견: 실시간 있으면 live, 없으면 샘플
            if (data.recommendation && data.recommendation.numberOfAnalysts) {
              sources.rec = "live";
              if (!data.recommendation.dist) data.recommendation.dist = sample.recommendation.dist;
            } else { data.recommendation = sample.recommendation; sources.rec = "sample"; }
          } else {
            // 전체 폴백: 모든 섹션 샘플 (sources는 초기값 그대로 sample)
            data = sample;
          }
          // 증권사 레포트 목록은 실시간 소스가 없어 항상 샘플/예시로 보완
          if (!data.reports || !data.reports.length) data.reports = sample.reports;
          data.sector = data.sector || sample.sector;
          return fetchNews(ticker.name)
            .then(function (n) { data.news = n; sources.news = "live"; })
            .catch(function () { data.news = sample.news; sources.news = "sample"; })
            .then(function () { data.sources = sources; return data; });
        });
    }

    /* ================= 렌더링 ================= */
    function el(html) { var t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
    function badge(src) {
      return src === "live"
        ? '<span class="badge live">실시간</span>'
        : '<span class="badge sample">샘플</span>';
    }

    function render(ticker, d) {
      destroyCharts();
      var anySample = Object.keys(d.sources).some(function (k) { return d.sources[k] === "sample"; });
      var allSample = Object.keys(d.sources).every(function (k) { return d.sources[k] === "sample"; });
      var q = d.quote;
      var mkt = ticker.market === "KOSDAQ" ? "KOSDAQ" : "KOSPI";

      var html = "";
      if (anySample) {
        html += '<div class="banner">' +
          (allSample
            ? "⚠ 실시간 데이터를 불러오지 못해 <b>샘플 데이터</b>로 표시합니다. (브라우저 CORS / 네트워크 정책). README의 프록시 설정을 참고하세요."
            : "일부 섹션은 실시간 데이터를 불러오지 못해 <b>샘플</b>로 대체했습니다. 각 섹션 배지를 확인하세요.") +
          "</div>";
      }

      // 1) 요약 헤더
      html += '<div class="card"><div class="summary">' +
        '<div class="name-block">' +
          '<div class="name">' + esc(ticker.name) + '<span class="mkt-badge">' + mkt + '</span></div>' +
          '<div class="code">' + ticker.code + ' · ' + (d.sector || "") + '</div>' +
        '</div>' +
        '<div class="price-block">' +
          '<div class="price ' + signCls(q.change) + '">' + nf.format(q.price) + '</div>' +
          '<div class="change ' + signCls(q.change) + '">' +
            (q.change > 0 ? "▲" : q.change < 0 ? "▼" : "-") + " " + nf.format(Math.abs(q.change)) + " (" + pct(q.changePct) + ")" +
          '</div>' +
        '</div>' +
        '<div class="kpis">' +
          kpi("시가총액", wonShort(q.marketCap)) +
          kpi("PER", q.per != null ? q.per.toFixed(1) + "배" : "-") +
          kpi("PBR", q.pbr != null ? q.pbr.toFixed(2) + "배" : "-") +
          kpi("EPS", q.eps != null ? nf.format(q.eps) + "원" : "-") +
          kpi("데이터", d.sources.market === "live" ? "실시간(Yahoo)" : "샘플") +
        '</div>' +
      '</div></div>';

      // 2) 시세
      html += '<div class="card">' +
        '<div class="section-title"><span class="accent"></span>시세 ' + badge(d.sources.market) +
          '<div class="range-toggle" id="rangeToggle">' +
            ["1M", "3M", "6M", "1Y"].map(function (r) {
              return '<button data-range="' + r + '"' + (r === state.range ? ' class="active"' : "") + ">" + r + "</button>";
            }).join("") +
          '</div>' +
        '</div>' +
        '<div class="chart-wrap"><canvas id="priceChart"></canvas></div>' +
        '<div class="chart-wrap small"><canvas id="volChart"></canvas></div>' +
        '<div class="stat-row">' +
          stat("현재가", won(q.price)) +
          stat("전일종가", won(q.prevClose)) +
          stat("52주 최고", won(q.high52)) +
          stat("52주 최저", won(q.low52)) +
        '</div>' +
      '</div>';

      // 3) 투자의견 + 4) 뉴스 (2단)
      html += '<div class="grid-2">' + recommendationCard(d) + newsCard(d) + '</div>';

      // 5) 재무제표
      html += financialsCard(d);

      html += '<div class="foot">본 화면은 정보 제공 목적의 참고 자료이며 투자 판단의 책임은 이용자에게 있습니다. ' +
        '데이터 출처: Yahoo Finance, Google News (실시간) / 내장 샘플(폴백).</div>';

      els.report.innerHTML = html;

      // 차트/이벤트
      renderPriceChart();
      renderVolChart();
      renderFinChart(d);
      var rt = document.getElementById("rangeToggle");
      if (rt) rt.addEventListener("click", function (e) {
        var b = e.target.closest("button"); if (!b) return;
        state.range = b.getAttribute("data-range");
        Array.prototype.forEach.call(rt.children, function (c) { c.classList.toggle("active", c === b); });
        renderPriceChart(); renderVolChart();
      });
    }

    function kpi(k, v) { return '<div class="kpi"><span class="k">' + k + '</span><span class="v">' + v + "</span></div>"; }
    function stat(k, v) { return '<div class="stat"><span class="k">' + k + '</span><span class="v">' + v + "</span></div>"; }
    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }

    function rangeCount() { return { "1M": 21, "3M": 63, "6M": 126, "1Y": 999 }[state.range] || 999; }
    function sliced(arr) { var n = rangeCount(); return arr.slice(Math.max(0, arr.length - n)); }

    function renderPriceChart() {
      var d = state.data; var c = themeColors();
      var labels = sliced(d.chart.dates), data = sliced(d.chart.close);
      var up = data[data.length - 1] >= data[0];
      var line = up ? css("--up") : css("--down");
      destroyChart("price");
      state.charts.price = new Chart(document.getElementById("priceChart"), {
        type: "line",
        data: { labels: labels, datasets: [{
          label: "종가", data: data, borderColor: line, borderWidth: 2,
          pointRadius: 0, pointHoverRadius: 4, tension: 0.2,
          fill: true, backgroundColor: fadeFill(line)
        }] },
        options: baseLineOpts(c, function (v) { return nf.format(v) + "원"; })
      });
    }
    function renderVolChart() {
      var d = state.data; var c = themeColors();
      var labels = sliced(d.chart.dates), data = sliced(d.chart.volume);
      destroyChart("vol");
      state.charts.vol = new Chart(document.getElementById("volChart"), {
        type: "bar",
        data: { labels: labels, datasets: [{ label: "거래량", data: data, backgroundColor: c.s1, borderRadius: 1, barPercentage: 1, categoryPercentage: .9 }] },
        options: Object.assign(baseLineOpts(c, function (v) { return nf.format(v); }), { scales: volScales(c) })
      });
    }
    function fadeFill(hex) {
      var ctx = document.getElementById("priceChart").getContext("2d");
      var g = ctx.createLinearGradient(0, 0, 0, 300);
      g.addColorStop(0, hexA(hex, .18)); g.addColorStop(1, hexA(hex, 0));
      return g;
    }
    function hexA(hex, a) {
      hex = hex.replace("#", "");
      if (hex.length === 3) hex = hex.split("").map(function (x) { return x + x; }).join("");
      var n = parseInt(hex, 16);
      return "rgba(" + ((n >> 16) & 255) + "," + ((n >> 8) & 255) + "," + (n & 255) + "," + a + ")";
    }
    function baseLineOpts(c, fmt) {
      return {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: c.surface, titleColor: c.text, bodyColor: c.text,
            borderColor: c.grid, borderWidth: 1, padding: 10,
            callbacks: { label: function (i) { return " " + fmt(i.parsed.y); } }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: c.muted, maxTicksLimit: 6, autoSkip: true, font: { size: 11 } } },
          y: { grid: { color: c.grid }, border: { display: false }, ticks: { color: c.muted, maxTicksLimit: 5, font: { size: 11 }, callback: function (v) { return fmt(v); } } }
        }
      };
    }
    function volScales(c) {
      return {
        x: { grid: { display: false }, ticks: { display: false } },
        y: { grid: { color: c.grid }, border: { display: false }, ticks: { color: c.muted, maxTicksLimit: 3, font: { size: 10 }, callback: function (v) { return v >= 1e6 ? (v / 1e6).toFixed(0) + "M" : v >= 1e3 ? (v / 1e3).toFixed(0) + "K" : v; } } }
      };
    }

    /* --- 투자의견 카드 --- */
    function recommendationCard(d) {
      var r = d.recommendation; var q = d.quote;
      var lo = Math.min(r.targetLow, q.price) * 0.96;
      var hi = Math.max(r.targetHigh, q.price) * 1.04;
      var span = hi - lo || 1;
      function posOf(v) { return ((v - lo) / span) * 100; }
      var upside = ((r.targetMean - q.price) / q.price) * 100;

      var dist = r.dist || { strongBuy: 0, buy: 0, hold: 0, sell: 0, strongSell: 0 };
      var total = dist.strongBuy + dist.buy + dist.hold + dist.sell + dist.strongSell || 1;
      var segs = [
        { k: "강력매수", v: dist.strongBuy, c: "--series-4" },
        { k: "매수", v: dist.buy, c: "--series-2" },
        { k: "중립", v: dist.hold, c: "--series-3" },
        { k: "매도", v: dist.sell + dist.strongSell, c: "--series-6" }
      ];

      var html = '<div class="card">' +
        '<div class="section-title"><span class="accent"></span>증권사 투자의견 · 목표주가 ' + badge(d.sources.rec) + '</div>';

      // 목표주가 밴드
      html += '<div class="target-band">' +
        '<div class="target-track">' +
          marker(posOf(r.targetLow), "--text-muted", "최저 " + nf.format(r.targetLow), "top") +
          marker(posOf(r.targetHigh), "--text-muted", "최고 " + nf.format(r.targetHigh), "top") +
          marker(posOf(q.price), "--text-primary", "현재가 " + nf.format(q.price), "bot") +
          marker(posOf(r.targetMean), "--series-1", "목표 " + nf.format(r.targetMean), "bot") +
        '</div>' +
      '</div>';

      html += '<div class="kpis" style="margin:0 0 14px;gap:14px 26px;">' +
        kpi("목표주가(평균)", nf.format(r.targetMean) + "원") +
        kpi("상승여력", '<span class="' + signCls(upside) + '">' + pct(upside) + "</span>") +
        kpi("투자의견", r.ratingText ? mapRating(r.ratingText) : "-") +
        kpi("애널리스트", r.numberOfAnalysts + "명") +
      '</div>';

      // 의견 분포 바
      html += '<div class="opinion-bar">' + segs.map(function (s) {
        var w = (s.v / total) * 100;
        if (w <= 0) return "";
        return '<div style="width:' + w + '%;background:var(' + s.c + ')">' + (w > 8 ? s.v : "") + "</div>";
      }).join("") + "</div>";
      html += '<div class="opinion-legend">' + segs.map(function (s) {
        return '<span><i style="background:var(' + s.c + ')"></i>' + s.k + " " + s.v + "</span>";
      }).join("") + "</div>";

      // 최근 리포트
      html += '<div class="section-title" style="margin:18px 0 8px;font-size:13px;"><span class="accent"></span>최근 증권사 레포트</div>';
      html += '<div class="list">' + d.reports.slice(0, 5).map(function (rp) {
        var opCls = /매도|sell/i.test(rp.opinion) ? "sell" : /중립|hold/i.test(rp.opinion) ? "hold" : "";
        return '<div class="list-item">' +
          '<span class="op-pill ' + opCls + '">' + esc(rp.opinion) + '</span>' +
          '<div class="main"><div class="t">' + esc(rp.title) + '</div>' +
          '<div class="meta">' + esc(rp.broker) + ' · ' + rp.date + '</div></div>' +
          '<div class="rt"><div class="tgt">' + nf.format(rp.target) + '</div><div class="tgt-k">목표가</div></div>' +
        '</div>';
      }).join("") + "</div>";

      html += '<div class="foot" style="text-align:left;margin-top:10px;">' +
        '📄 원문 리포트: <a href="https://finance.naver.com/research/company_list.naver?searchType=itemCode&itemCode=' + d.reportCode() + '" target="_blank" rel="noopener">네이버 금융 리서치</a></div>';
      html += "</div>";
      return html;
    }
    function marker(left, colorVar, label, place) {
      left = Math.max(0, Math.min(100, left));
      return '<div class="target-marker" style="left:' + left + '%">' +
        '<span class="dot" style="background:var(' + colorVar + ')"></span>' +
        '<span class="lbl ' + place + '" style="color:var(' + colorVar + ')">' + label + "</span></div>";
    }
    function mapRating(k) {
      var map = { strong_buy: "적극매수", buy: "매수", hold: "중립", sell: "매도", underperform: "시장수익률하회", outperform: "시장수익률상회" };
      return map[String(k).toLowerCase()] || k;
    }

    /* --- 뉴스 카드 --- */
    function newsCard(d) {
      var html = '<div class="card"><div class="section-title"><span class="accent"></span>시황 · 관련 뉴스 ' + badge(d.sources.news) + '</div>';
      html += '<div class="list">' + d.news.slice(0, 6).map(function (n) {
        return '<div class="list-item"><div class="main">' +
          '<a class="t" href="' + n.url + '" target="_blank" rel="noopener">' + esc(n.title) + '</a>' +
          '<div class="meta">' + esc(n.source || "") + (n.date ? " · " + n.date : "") + '</div>' +
          '</div></div>';
      }).join("") + "</div></div>";
      return html;
    }

    /* --- 재무제표 카드 --- */
    function financialsCard(d) {
      var f = d.financials;
      var html = '<div class="card"><div class="section-title"><span class="accent"></span>재무제표 (연간, 단위: 억원) ' + badge(d.sources.fin) + '</div>';
      html += '<div class="grid-2">';
      html += '<div class="chart-wrap" style="height:260px;"><canvas id="finChart"></canvas></div>';
      // 표
      html += '<div style="overflow-x:auto;"><table class="fin"><thead><tr><th>항목</th>' +
        f.years.map(function (y) { return "<th>" + y + "</th>"; }).join("") + "</tr></thead><tbody>";
      html += finRow("매출액", f.revenue);
      html += finRow("영업이익", f.operatingIncome);
      html += finRow("당기순이익", f.netIncome);
      html += finRow("자산총계", f.assets);
      html += finRow("부채총계", f.liabilities);
      html += finRow("자본총계", f.equity);
      html += finRow("ROE(%)", f.roe, true);
      html += finRow("부채비율(%)", f.debtRatio, true);
      html += "</tbody></table></div>";
      html += "</div></div>";
      return html;
    }
    function finRow(name, arr, isPct) {
      return "<tr><td>" + name + "</td>" + arr.map(function (v) {
        if (v == null) return "<td>-</td>";
        var txt = isPct ? v.toFixed(1) : eok(v);
        var cls = isPct ? "" : "";
        return "<td>" + txt + "</td>";
      }).join("") + "</tr>";
    }
    function renderFinChart(d) {
      var f = d.financials; var c = themeColors();
      destroyChart("fin");
      state.charts.fin = new Chart(document.getElementById("finChart"), {
        type: "bar",
        data: {
          labels: f.years,
          datasets: [
            { label: "매출액", data: f.revenue, backgroundColor: c.s1, borderRadius: 3 },
            { label: "영업이익", data: f.operatingIncome, backgroundColor: c.s2, borderRadius: 3 },
            { label: "당기순이익", data: f.netIncome, backgroundColor: c.s3, borderRadius: 3 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "top", labels: { color: c.text, boxWidth: 10, boxHeight: 10, font: { size: 11 } } },
            tooltip: {
              backgroundColor: c.surface, titleColor: c.text, bodyColor: c.text, borderColor: c.grid, borderWidth: 1,
              callbacks: { label: function (i) { return " " + i.dataset.label + ": " + eok(i.parsed.y) + "원"; } }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: c.muted, font: { size: 11 } } },
            y: { grid: { color: c.grid }, border: { display: false }, ticks: { color: c.muted, maxTicksLimit: 5, font: { size: 10 }, callback: function (v) { return eok(v); } } }
          }
        }
      });
    }

    function destroyChart(k) { if (state.charts[k]) { state.charts[k].destroy(); delete state.charts[k]; } }
    function destroyCharts() { Object.keys(state.charts).forEach(destroyChart); }

    /* reportCode helper (네이버 리서치 링크용) - render 컨텍스트에서 코드 접근 */
    /* d 객체엔 code가 없으므로 state.ticker 사용 */

    /* ================= 조회 흐름 ================= */
    function runQuery(rawInput) {
      var ticker = window.resolveTicker(rawInput);
      if (!ticker) {
        els.report.innerHTML = '<div class="state"><div class="big">🔍</div>' +
          '<div>"' + esc(rawInput) + '" 종목을 찾지 못했습니다.<br>종목명(예: 삼성전자) 또는 6자리 코드(예: 005930)를 입력하세요.</div></div>';
        return;
      }
      state.ticker = ticker;
      // reportCode를 render에서 쓰기 위해 d에 주입되는 helper
      els.report.innerHTML = '<div class="state"><div class="spinner"></div><div>' + esc(ticker.name) + ' (' + ticker.code + ') 리포트를 불러오는 중…</div></div>';
      els.q.value = ticker.name;
      loadData(ticker).then(function (d) {
        d.reportCode = function () { return ticker.code; };
        state.data = d;
        render(ticker, d);
      }).catch(function (err) {
        console.error(err);
        var d = window.generateSampleData(ticker);
        d.sources = { market: "sample", fin: "sample", rec: "sample", news: "sample" };
        d.news = d.news; d.reportCode = function () { return ticker.code; };
        state.data = d; render(ticker, d);
      });
    }

    /* ================= 초기화 ================= */
    function buildDatalist() {
      els.datalist.innerHTML = window.TICKERS.map(function (t) {
        return '<option value="' + t.name + '">' + t.code + " · " + t.market + "</option>";
      }).join("");
    }
    function initTheme() {
      var saved = null; try { saved = localStorage.getItem("theme"); } catch (e) {}
      if (saved) document.documentElement.setAttribute("data-theme", saved);
      els.themeBtn.addEventListener("click", function () {
        var cur = document.documentElement.getAttribute("data-theme");
        var next = cur === "dark" ? "light" : cur === "light" ? "dark" : (matchMedia("(prefers-color-scheme: dark)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("theme", next); } catch (e) {}
        if (state.data && state.ticker) render(state.ticker, state.data);
      });
    }

    els.form.addEventListener("submit", function (e) { e.preventDefault(); if (els.q.value.trim()) runQuery(els.q.value.trim()); });
    els.printBtn.addEventListener("click", function () { window.print(); });
    buildDatalist();
    initTheme();
    // 기본 예시 종목
    runQuery("삼성전자");
  })();
  </script>
</body>
</html>
